services:
  bot:
    build: .
    container_name: senu_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8080}
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:${API_PORT:-8080}/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 5
